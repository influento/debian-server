# tests/vm-server.conf — Test config for Debian server VM
# Usage: bash install.sh --config tests/vm-server.conf

# /dev/vda for QEMU (VirtIO), /dev/sda for Hyper-V
TARGET_DISK="/dev/vda"
HOSTNAME="testuser-server-test"
USERNAME="testuser"
TIMEZONE="UTC"
LOCALE="en_US.UTF-8"
KEYMAP="us"
FS_TYPE="ext4"
SWAP_SIZE="2G"
DEBIAN_RELEASE="trixie"
# Throwaway credential for disposable test VMs only — do not reuse on real systems.
PASSWORD="test"
